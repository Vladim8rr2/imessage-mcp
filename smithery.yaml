startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      IMESSAGE_DB:
        type: string
      IMESSAGE_SAFE_MODE:
        type: string
      IMESSAGE_SYNC:
        type: string
    required: []
  commandFunction: |
    (config) => ({
      command: "npx",
      args: ["-y", "imessage-mcp"],
      env: { ...config }
    })
